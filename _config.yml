lang:                  en
title:                 Fixeddoor's Blog
description:           A blog about software development, programming, and technology.
copyright:             © 2024. All rights reserved.

logo:                  /assets/img/Fixed_logo.png

author:
  name:                Fixed
  email:               fixeddoor0301@gmail.com
  # picture:           /assets/img/avatar.jpg

menu:
  - title:             About
    url:               /about/
  - title:             Research
    url:               /research/
  - title:             Code
    url:               /code/
  - title:             Illust
    url:               /illust/
  - title:             Archive
    url:               /archive/

accent_image:          /assets/img/sidebar-bg.jpg
accent_color:          rgb(79,177,186)
theme_color:           rgb(25,55,71)

url: https://fixed0301.github.io

google_fonts:          false

hydejack:
  post_addons:         [about, newsletter, related, random, comments]
  project_addons:      [about, newsletter, other, comments]

  no_mark_external:    false
  no_push_state:       false
  no_drawer:           false
  no_navbar:           false
  no_search:           false
  no_inline_css:       false
  no_page_style:       false
  no_break_layout:     true
  no_toc:              false
  no_third_column:     false
  no_large_headings:   false
  no_structured_data:  false
  no_theme_color:      false
  no_breadcrumbs:      false

  use_lsi:             true
  cookies_banner:      true
  advertise:           true
  hide_dates:          false
  hide_last_modified:  false

  dark_mode:
    always:            false
    dynamic:           true
    sunrise:           6
    sunset:            18
    icon:              true

  offline:
    enabled:           false
    cache_version:     1
    precache_assets:
      - /assets/img/swipe.svg

optional_front_matter:
  remove_originals:    true

readme_index:
  remove_originals:    true
  with_frontmatter:    true

relative_links:
  collections:         true

titles_from_headings:
  strip_title:         true
  collections:         true

compress_html:
  comments:            ["<!-- ", " -->"]
  clippings:           all
  endings:             all
  ignore:
    envs:              [development]

sass:
  style:               compressed

exclude:
  - nul
  - tmpclaude-344f-cwd
  - tmpclaude-962e-cwd
  - tmpclaude-963b-cwd
  - tmpclaude-e9b1-cwd
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - webpack.config.js
  - CHANGELOG.md
  - LICENSE.md
  - NOTICE.md
  - README.md
  - example/
  - docs/
